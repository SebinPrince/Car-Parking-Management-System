<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vehicle Registration System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Login to access the Vehicle Registration System</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <div id="loginError" class="error-message"
                style="display: none; color: #e53e3e; margin-top: 10px; font-size: 0.9rem; text-align: center;"></div>
            <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
        </form>
        <div class="login-footer">
            <p>Default credentials: admin / admin</p>
            <p style="margin-top: 10px;">Don't have an account? <a href="signup.html" style="color: #4a5568;">Sign up
                    here</a>.</p>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
