<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Vehicle Registration System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h2>Create Account</h2>
            <p>Sign up for the Vehicle Registration System</p>
        </div>
        <form id="signupForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Choose a password">
            </div>
            <div id="signupError" class="error-message"
                style="display: none; color: #e53e3e; margin-top: 10px; font-size: 0.9rem; text-align: center;"></div>
            <div id="signupSuccess" class="success-message"
                style="display: none; color: #38a169; margin-top: 10px; font-size: 0.9rem; text-align: center;"></div>
            <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
        </form>
        <div class="login-footer" style="margin-top: 15px; text-align: center;">
            <p>Already have an account? <a href="login.html" style="color: #4a5568;">Log in here</a>.</p>
        </div>
    </div>

    <script src="signup.js"></script>
</body>

</html>
